name: Update fire map
on:
  schedule:
    - cron: "0 13 * * *"   # ~7am Mountain, daily
  workflow_dispatch:        # adds a "Run workflow" button
  push:
    paths: ["map_template3.html","co_counties_all.geojson","build.py"]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - run: python build.py
      - name: Commit updated map
        run: |
          git config user.name "fire-map-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update fire restrictions ($(date -u +%F))"
          git push
